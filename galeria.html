<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katsumi | Galéria</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/img/favico.jpg">
</head>
<body>

    <nav>
        <div class="nav-logo">
            <a href="index.html"><img src="img/Aliras.png" alt="Katsumi Logo"></a>
        </div>

        <button class="mobile-menu-btn" id="menu-btn">
            <i class="bi bi-list"></i>
        </button>

        <div class="nav-links" id="nav-links">
            <a href="index.html#home">Főoldal</a>
            <a href="index.html#about">Rólam</a>
            <a href="galeria.html" class="active">Galéria</a>
            <a href="arak.html">Árak</a>
            <a href="index.html#commission">Commission</a>
            <a href="tos.html">TOS</a>
            <a href="index.html#contact">Kapcsolat</a>
        </div>
        
        <div class="nav-socials">
            <a href="https://discord.com/" target="_blank"><i class="bi bi-discord"></i></a>
            <a href="https://t.me/Kqtsumi" target="_blank"><i class="bi bi-telegram"></i></a>
            <a href="mailto:Katsumiracoon@gmail.com"><i class="bi bi-envelope"></i></a>
        </div>
    </nav>

    <div class="gallery-header" id="gallery">
        <h1>Galéria <i class="bi bi-images"></i></h1>
        <p>Válogatás az eddigi legkedvesebb digitális illusztrációimból és karakterterveimből.</p>
    </div>

    <section id="finished-works">
        <h2 class="section-title">Kész rajzok <i class="bi bi-palette"></i></h2>
        <div class="gallery-grid" id="finished-grid" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); padding: 0;">
        </div>
    </section>

    <section id="sketches">
        <h2 class="section-title">Sketchek <i class="bi bi-pencil"></i></h2>
        <div class="gallery-grid" id="sketches-grid" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); padding: 0;">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Katsumi &bull; Képek készítője: Katsumi</p>
    </footer>

    <script>
        const menuBtn = document.getElementById('menu-btn');
        const navLinks = document.getElementById('nav-links');
        const icon = menuBtn.querySelector('i');

        menuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            if(navLinks.classList.contains('active')) {
                icon.classList.replace('bi-list', 'bi-x-lg');
            } else {
                icon.classList.replace('bi-x-lg', 'bi-list');
            }
        });

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                if(window.innerWidth <= 900) {
                    navLinks.classList.remove('active');
                    icon.classList.replace('bi-x-lg', 'bi-list');
                }
            });
        });

        fetch('data/gallery.json')
            .then(res => res.json())
            .then(data => {
                const fGrid = document.getElementById('finished-grid');
                const sGrid = document.getElementById('sketches-grid');
                data.items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.innerHTML = `<img src="${item.image}" alt="${item.title}"><div class="overlay"><span>${item.title}</span><br><i>${item.type}</i></div>`;
                    if(item.category === 'finished') fGrid.appendChild(div);
                    if(item.category === 'sketch') sGrid.appendChild(div);
                });
            });
    </script>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
