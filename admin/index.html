<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katsumi Admin</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>
    <script>
        CMS.registerPreviewStyle("../style.css");

        const GalleryPreview = createClass({
            render: function() {
                const entry = this.props.entry;
                const items = entry.getIn(['data', 'items']);
                const getAsset = this.props.getAsset;
                
                if (!items) {
                    return h('div', {style: {padding: '40px', color: '#e8e2df', backgroundColor: '#2a2524', minHeight: '100vh'}}, "Kezdődjön az alkotás! Tölts fel egy képet.");
                }

                return h('div', {style: {padding: '40px', backgroundColor: '#2a2524', minHeight: '100vh'}},
                    h('div', {className: 'gallery-grid'},
                        items.map(function(item, index) {
                            const imagePath = item.get('image');
                            const imageUrl = imagePath ? getAsset(imagePath).toString() : '';
                            
                            return h('div', {className: 'gallery-item', key: index},
                                h('img', {src: imageUrl}),
                                h('div', {className: 'overlay', style: {opacity: 1, background: 'linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%)'}},
                                    h('span', null, item.get('title') || 'Névtelen'),
                                    h('br'),
                                    h('i', null, item.get('type') || 'Típus')
                                )
                            );
                        })
                    )
                );
            }
        });

        CMS.registerPreviewTemplate("gallery", GalleryPreview);
    </script>
</body>
</html>
